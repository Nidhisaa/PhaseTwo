<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Num Switch</title>
</head>
<body>
    <input id="num1" type="text">
    <input id="num2" type="text">
    <button id="addButton" type="button" onclick="totalSum()">Add</button>
    <p id="result">Result</p>

    <script>
        var box1 = document.getElementById("num1")
        var box2 = document.getElementById("num2")
        var res = document.getElementById("result")

        function totalSum(){
            var a = Number(box1.value)
            var b = Number(box2.value)
            res.textContent = a + b
        }
    </script>
</body>
</html>
